<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFE STOP CALIFORNIA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      text-align: center;
    }

    .top {
      background: #fff6d8;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid #eadfa7;
    }

    .header {
      padding: 30px 20px;
      background: white;
    }

    .logo {
      height: 200px;
      width: auto;
      display: block;
      margin: 0 auto 10px auto;
    }

    h1 {
      color: #123b7a;
      margin: 10px 0 8px 0;
      font-size: 28px;
    }

    .sub {
      color: #667085;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      margin: 5px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: #123b7a;
      color: white;
    }

    .secondary {
      background: white;
      border: 1px solid #ccc;
      color: #123b7a;
    }
  </style>
</head>
<body>
  <div class="top">Prototype demo — sample data only</div>

  <div class="header">
    <img src="logo.png" class="logo" alt="SAFE STOP CALIFORNIA logo">

    <h1>SAFE STOP CALIFORNIA</h1>

    <div class="sub">Driver Interaction Education Program</div>

    <button class="btn secondary">Verify Completion</button>
    <button class="btn primary">Start Demo</button>
  </div>
</body>
</html>
