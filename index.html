<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAFE STOP CALIFORNIA</title>
  <style>
    :root{
      --navy:#123b7a;
      --navy2:#1e4c8f;
      --gold:#f0c24b;
      --muted:#667085;
      --line:#d9e2ef;
      --bg:#f4f7fb;
      --card:#ffffff;
      --ok:#18794e;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#1d2433}
    .top{background:#fff6d8;padding:10px;text-align:center;font-size:13px;font-weight:700;border-bottom:1px solid #eadfa7}
    .wrap{max-width:1100px;margin:auto;padding:0 16px}
    header{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:5}
    .nav{display:flex;justify-content:center;align-items:center;padding:20px 0}
    .logo{height:209px;width:auto;display:block;margin:0 auto 10px auto}
    .hero{padding:24px 0 18px;text-align:center}
    .eyebrow{display:inline-block;background:#edf4ff;border:1px solid #d6e4fb;color:var(--navy);font-size:12px;font-weight:700;border-radius:999px;padding:7px 10px;margin-bottom:14px}
    h1{color:var(--navy);margin:5px 0;font-size:30px}
    .sub{color:var(--muted);font-size:15px;margin-bottom:18px}
    .lead{font-size:18px;line-height:1.6;color:var(--muted);max-width:800px;margin:0 auto}
    .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:20px 0 12px}
    .btn{padding:12px 18px;border-radius:25px;border:none;cursor:pointer;font-weight:700}
    .primary{background:linear-gradient(180deg,var(--navy),var(--navy2));color:white}
    .secondary{background:white;border:1px solid #ccc;color:var(--navy)}
    .tag{font-weight:700;color:#56657d}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
    .card,.panel,.step,.fieldbox,.cert,.result,.stage{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 30px rgba(18,59,122,.06)}
    .card{padding:16px;text-align:left}
    .card strong{display:block;color:var(--navy);font-size:18px;margin-bottom:4px}
    .card span{font-size:14px;color:var(--muted);line-height:1.45}
    .section{margin-top:30px}
    .panel{padding:28px;text-align:left}
    .panel h2,.fieldbox h3,.screen h3,.cert h3{color:var(--navy)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:10px 0 28px}
    .step{padding:16px;text-align:left}
    .num{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:700;margin-bottom:10px}
    .stage{overflow:hidden;box-shadow:0 20px 50px rgba(18,59,122,.08)}
    .stageTop{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#f8fbff;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px}
    .badge{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);font-weight:700}
    .screen{display:none;padding:32px;min-height:520px;text-align:left}
    .screen.active{display:block}
    .screen p{color:var(--muted);line-height:1.6}
    .two{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;margin-top:18px}
    .fieldbox{padding:20px}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
    label{display:grid;gap:8px;font-size:14px;font-weight:700}
    input,select{padding:14px;border:1px solid #ccd7e6;border-radius:16px;font-size:15px}
    .mutedbox{background:#f8fbff;border:1px solid #dde8fa;padding:12px 14px;border-radius:16px;color:#567196;font-size:14px;margin-top:14px}
    .video{background:linear-gradient(135deg,var(--navy),#264f8b);color:#fff;padding:24px;border-radius:24px;min-height:300px;display:flex;flex-direction:column;justify-content:space-between}
    .videoTag{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#fff4c6}
    .play{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2); ​:contentReference[oaicite:0]{index=0}
